{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<h1 class="mb-4 text-xl font-semibold">{{ page_title }}</h1>
{{ initial_lines|json_script:"initial-lines" }}
<form method="post" class="space-y-4" x-data="journalForm()">
    {% csrf_token %}
    <div class="grid gap-4 md:grid-cols-2">
        <div>
            <label class="block text-sm">Tanggal</label>
            {{ form.date }}
        </div>
        <div>
            <label class="block text-sm">Memo</label>
            {{ form.memo }}
        </div>
    </div>
    <div class="overflow-hidden rounded border bg-white">
        <table class="w-full text-sm">
            <thead class="bg-slate-100 text-left">
                <tr><th class="p-2">Akun</th><th class="p-2">Keterangan</th><th class="p-2">Debit</th><th class="p-2">Kredit</th><th class="p-2"></th></tr>
            </thead>
            <tbody>
                <template x-for="(row, index) in rows" :key="row.id">
                    <tr class="border-t">
                        <td class="p-2">
                            <select name="account" class="w-full rounded border px-2 py-1" x-model="row.account">
                                <option value="">Pilih akun</option>
                                {% for account in accounts %}
                                    <option value="{{ account.pk }}">{{ account.code }} - {{ account.name }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td class="p-2"><input name="description" class="w-full rounded border px-2 py-1" x-model="row.description"></td>
                        <td class="p-2"><input name="debit" type="number" step="0.01" min="0" class="w-full rounded border px-2 py-1 text-right" x-model="row.debit"></td>
                        <td class="p-2"><input name="credit" type="number" step="0.01" min="0" class="w-full rounded border px-2 py-1 text-right" x-model="row.credit"></td>
                        <td class="p-2 text-right"><button type="button" class="text-red-700" @click="rows.splice(index,1)" x-show="rows.length > 2">Hapus</button></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
    <div class="flex justify-between">
        <button type="button" class="rounded border bg-white px-4 py-2 text-sm" @click="addRow()">Tambah Baris</button>
        <button class="rounded bg-slate-900 px-4 py-2 text-sm text-white">{{ submit_label }}</button>
    </div>
</form>
<script>
    function journalForm() {
        const initialRows = JSON.parse(document.getElementById('initial-lines').textContent);
        return {
            rows: initialRows.length ? initialRows : [
                {id: 0, account: '', description: '', debit: '', credit: ''},
                {id: 1, account: '', description: '', debit: '', credit: ''},
            ],
            addRow() {
                this.rows.push({id: Date.now() + Math.random(), account: '', description: '', debit: '', credit: ''});
            },
        };
    }
</script>
{% endblock %}
