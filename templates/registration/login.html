{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="mx-auto mt-20 max-w-sm rounded border bg-white p-6">
    <h1 class="mb-4 text-xl font-semibold">Login</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div>
            <label class="block text-sm">Username</label>
            <input class="mt-1 w-full rounded border px-3 py-2" type="text" name="username" autofocus>
        </div>
        <div>
            <label class="block text-sm">Password</label>
            <input class="mt-1 w-full rounded border px-3 py-2" type="password" name="password">
        </div>
        <button class="w-full rounded bg-slate-900 px-4 py-2 text-white">Masuk</button>
    </form>
</div>
{% endblock %}
