{% extends "base.html" %}
{% block title %}Rekening Kas/Bank{% endblock %}
{% block content %}
<h1 class="mb-4 text-xl font-semibold">Rekening Kas/Bank Baru</h1>
<form method="post" class="max-w-xl rounded border bg-white p-4 text-sm">
    {% csrf_token %}
    <div class="mb-3"><label class="block">Nama</label><input class="w-full rounded border px-2 py-1" type="text" name="name" value="{{ form.name.value|default:'' }}"></div>
    <div class="mb-4"><label class="block">Akun COA Kas/Bank</label>{{ form.account }}</div>
    <button class="rounded bg-slate-900 px-4 py-2 text-white">Simpan</button>
    <a class="ml-2 rounded border bg-white px-4 py-2" href="{% url 'cashbank:account_list' %}">Batal</a>
</form>
{% endblock %}
