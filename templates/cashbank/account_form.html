{% extends "base.html" %}
{% block title %}Rekening Kas/Bank{% endblock %}
{% block content %}
<h1 class="mb-4 text-xl font-semibold">Rekening Kas/Bank Baru</h1>
<form method="post" class="max-w-2xl rounded border bg-white p-4 text-sm">
    {% csrf_token %}
    <div class="grid gap-3 sm:grid-cols-2">
        <div><label class="block">Nama</label><input class="w-full rounded border px-2 py-1" type="text" name="name" value="{{ form.name.value|default:'' }}"></div>
        <div><label class="block">Jenis</label>{{ form.account_kind }}</div>
        <div><label class="block">Nama Bank/E-Wallet</label><input class="w-full rounded border px-2 py-1" type="text" name="bank_name" value="{{ form.bank_name.value|default:'' }}"></div>
        <div><label class="block">Nomor Rekening</label><input class="w-full rounded border px-2 py-1" type="text" name="account_number" value="{{ form.account_number.value|default:'' }}"></div>
        <div class="sm:col-span-2"><label class="block">Nama Pemilik Rekening</label><input class="w-full rounded border px-2 py-1" type="text" name="account_holder" value="{{ form.account_holder.value|default:'' }}"></div>
        <div class="sm:col-span-2"><label class="block">Akun COA Kas/Bank</label>{{ form.account }}</div>
        <div class="sm:col-span-2"><label class="block">Catatan</label>{{ form.notes }}</div>
    </div>
    {% if form.errors %}<div class="mt-3 rounded border border-red-200 bg-red-50 p-3 text-red-700">{{ form.errors }}</div>{% endif %}
    <div class="mt-4">
        <button class="rounded bg-slate-900 px-4 py-2 text-white">Simpan</button>
        <a class="ml-2 rounded border bg-white px-4 py-2" href="{% url 'cashbank:account_list' %}">Batal</a>
    </div>
</form>
{% endblock %}
