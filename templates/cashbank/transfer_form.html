{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<h1 class="mb-4 text-xl font-semibold">{{ page_title }}</h1>
<form method="post" class="max-w-2xl rounded border bg-white p-4 text-sm">
    {% csrf_token %}
    <div class="grid gap-3 md:grid-cols-2">
        <div><label class="block">Tanggal</label><input class="w-full rounded border px-2 py-1" type="date" name="date" value="{{ form.date.value|date:'Y-m-d'|default:form.date.value }}"></div>
        <div><label class="block">Nilai Transfer</label><input class="w-full rounded border px-2 py-1 text-right" type="number" step="0.01" name="amount" value="{{ form.amount.value|default:'' }}"></div>
        <div><label class="block">Dari Rekening</label>{{ form.from_account }}</div>
        <div><label class="block">Ke Rekening</label>{{ form.to_account }}</div>
        <div><label class="block">Biaya Admin</label><input class="w-full rounded border px-2 py-1 text-right" type="number" step="0.01" name="admin_fee" value="{{ form.admin_fee.value|default:'0' }}"></div>
        <div><label class="block">Akun Biaya Admin</label>{{ form.admin_fee_account }}</div>
    </div>
    <div class="mt-3"><label class="block">Memo</label><textarea class="w-full rounded border px-2 py-1" name="memo" rows="3">{{ form.memo.value|default:'' }}</textarea></div>
    <div class="mt-5 flex gap-2"><button class="rounded bg-slate-900 px-4 py-2 text-white">{{ submit_label }}</button><a class="rounded border bg-white px-4 py-2" href="{% url 'cashbank:transaction_list' %}">Batal</a></div>
</form>
{% endblock %}
